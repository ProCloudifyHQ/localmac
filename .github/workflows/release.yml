name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  SCHEME: Localmac
  APP_NAME: Localmac

jobs:
  build:
    name: Build, Sign & Notarize
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme "$SCHEME" \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            | xcpretty

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist Installer/ExportOptions.plist

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "$APP_NAME" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "$APP_NAME.app" 130 170 \
            --app-drop-link 410 170 \
            "$RUNNER_TEMP/$APP_NAME-${{ github.ref_name }}.dmg" \
            "$RUNNER_TEMP/export/$APP_NAME.app"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/$APP_NAME-${{ github.ref_name }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --wait
          xcrun stapler staple "$RUNNER_TEMP/$APP_NAME-${{ github.ref_name }}.dmg"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/${{ env.APP_NAME }}-${{ github.ref_name }}.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          DMG_SHA=$(shasum -a 256 "$RUNNER_TEMP/$APP_NAME-${{ github.ref_name }}.dmg" | awk '{print $1}')
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i '' "s/version .*/version \"$VERSION\"/" Formula/localmac.rb
          sed -i '' "s/sha256 .*/sha256 \"$DMG_SHA\"/" Formula/localmac.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/localmac.rb
          git commit -m "chore: bump cask to $VERSION"
          git push
