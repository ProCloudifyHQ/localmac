name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  SCHEME: Localmac
  APP_NAME: Localmac

jobs:
  build:
    name: Build, Sign, Notarize & Release
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import signing certificate
        if: ${{ env.DEVELOPER_ID_CERTIFICATE_P12 != '' }}
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain
          echo "$DEVELOPER_ID_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build archive (signed)
        if: ${{ env.DEVELOPER_ID_CERTIFICATE_P12 != '' }}
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
        run: |
          xcodebuild archive \
            -project Localmac.xcodeproj \
            -scheme "$SCHEME" \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application"

      - name: Build archive (unsigned fallback)
        if: ${{ env.DEVELOPER_ID_CERTIFICATE_P12 == '' }}
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
        run: |
          xcodebuild archive \
            -project Localmac.xcodeproj \
            -scheme "$SCHEME" \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app (signed)
        if: ${{ env.DEVELOPER_ID_CERTIFICATE_P12 != '' }}
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist Installer/ExportOptions.plist

      - name: Export app (unsigned fallback)
        if: ${{ env.DEVELOPER_ID_CERTIFICATE_P12 == '' }}
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist Installer/ExportOptions-unsigned.plist

      - name: Create DMG
        run: |
          create-dmg \
            --volname "$APP_NAME" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "$APP_NAME.app" 130 170 \
            --app-drop-link 410 170 \
            "$RUNNER_TEMP/$APP_NAME-${{ github.ref_name }}.dmg" \
            "$RUNNER_TEMP/export/$APP_NAME.app"

      - name: Notarize DMG
        if: ${{ env.DEVELOPER_ID_CERTIFICATE_P12 != '' }}
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/$APP_NAME-${{ github.ref_name }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --wait
          xcrun stapler staple "$RUNNER_TEMP/$APP_NAME-${{ github.ref_name }}.dmg"

      - name: Get DMG SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 "$RUNNER_TEMP/$APP_NAME-${{ github.ref_name }}.dmg" | awk '{print $1}')
          echo "SHA=$SHA" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Localmac ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.NOTES }}
          files: ${{ runner.temp }}/${{ env.APP_NAME }}-${{ github.ref_name }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA="${{ steps.sha.outputs.SHA }}"
          sed -i '' "s/version .*/version \"$VERSION\"/" Formula/localmac.rb
          sed -i '' "s/sha256 .*/sha256 \"$SHA\"/" Formula/localmac.rb
          git config user.name "ProCloudifyHQ"
          git config user.email "hello@procloudify.com"
          git add Formula/localmac.rb
          git commit -m "chore: bump cask to v$VERSION"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
